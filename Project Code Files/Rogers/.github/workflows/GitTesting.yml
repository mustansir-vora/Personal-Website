name: GitTesting
on:
  workflow_dispatch:
  # push: {}
  # pull_request: {}

run-name: "[${{github.ref_name}}][${{github.actor}}] ${{ github.event.head_commit.message != null && github.event.head_commit.message || 'Manually Triggered' }}"

jobs:
  GitTesting:
    env:
      environment: ${{  github.ref_name == 'Prod' && 'Prod' || github.ref_name == 'Qa' && 'Qa' || 'Dev' }}
      GIT_USER: ${{ vars.GIT_USER }}
      GIT_EMAIL: ${{ vars.GIT_EMAIL }}
      GH_APP_PRIVATE_KEY_CCT: ${{ secrets.GH_APP_PRIVATE_KEY_CCT }}
    runs-on: ${{ github.ref_name == 'Prod' && vars.RUNNER_LABEL_PROD || vars.RUNNER_LABEL_DEFAULT }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: false
      - name: Generate GitHub App Token
        id: generate-token
        uses: actions/create-github-app-token@v2
        with:
          app-id: 3075548
          private-key: ${{ secrets.GH_APP_PRIVATE_KEY_CCT }}
          owner: ${{ github.repository_owner }}
          repositories: ${{ github.event.repository.name }}

        # Git Credentials Helper
      - name: Git Credentials Helper
        uses: RogersCommunications/enterprise-actions-workflows/git/git-credentials@main
        with:
          git_service_token: ${{ steps.generate-token.outputs.token }}
          git_user: $GIT_USER
          git_user_email: $GIT_EMAIL
          working_directory: .

      # Configure Git
      - name: Configure Git
        run: |
          git config user.name "$GIT_USER"
          git config user.email "$GIT_EMAIL"

          echo "Git user.name configured as: $(git config user.name)"
          echo "Git user.email configured as: $(git config user.email)"
      - name: GitTesting
        shell: bash
        run: |
          echo "Set User:"  
          echo "Current User:"
          git config user.name
          git config user.email
          echo "git status"
          git status
          echo "create file"
          date > validations_last_update_time.txt
          echo "git status"
          git status
          echo "git add"
          git add validations_last_update_time.txt
          echo "git status"
          git status
          echo "git commit"
          git commit -m "[skip ci][ci skip] Validations Test Commit"
          echo "Current User:"
          git config user.name
          git config user.email
          echo "git push"
          git push


